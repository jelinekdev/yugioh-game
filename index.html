<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://images.ygoprodeck.com; script-src 'self'; connect-src https://db.ygoprodeck.com;">  <title>Yu-Gi-Oh!</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/DeckBuilder.css">
</head>
<body>

  <div id="app">

    <div id="screen-menu">
      <h1>Yu-Gi-Oh!</h1>
      <nav>
        <button data-target="screen-deck-builder">Deck Builder</button>
        <button data-target="screen-play">Spielen</button>
      </nav>
    </div>

<div id="screen-deck-builder" class="hidden">
      <div class="deck-builder-layout">

        <aside class="card-detail">
          <div id="card-preview">
            <p class="card-preview-placeholder">Karte auswaehlen</p>
          </div>
          <div id="card-info">
            <h3 id="card-info-name"></h3>
            <p id="card-info-type"></p>
            <p id="card-info-atk-def"></p>
            <p id="card-info-desc"></p>
          </div>
          <div class="deck-actions">
            <button id="save-deck-button">Deck speichern</button>
            <button data-target="screen-menu">Zurueck</button>
          </div>
        </aside>

        <main class="deck-view">
          <h2>Main Deck (<span id="deck-count">0</span>/60)</h2>
          <div id="deck-list"></div>
        </main>

        <aside class="card-search">
          <h2>Karten suchen</h2>
          <input type="text" id="search-input" placeholder="Kartenname eingeben..." autocomplete="off">
          <button id="search-button">Suchen</button>
          <div id="search-results"></div>
        </aside>

      </div>
    </div>

    <div id="screen-play" class="hidden">
      <h2>Spielen</h2>
      <button data-target="screen-menu">Zurück</button>
    </div>

  </div>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/DeckBuilder.js"></script>
</body>
</html>
